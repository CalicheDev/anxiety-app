<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#BC8CFF"/>
      <stop offset="50%"  stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#56D364"/>
    </linearGradient>
    <clipPath id="cc">
      <circle cx="24" cy="24" r="17"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0D1117"/>

  <!-- Circle container -->
  <circle cx="24" cy="24" r="18" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <!-- Wave -->
  <path clip-path="url(#cc)"
        d="M 7,24
           C 11,24 13,16 17,16
           C 21,16 22,32 26,32
           C 30,32 31,16 35,16
           C 39,16 40,24 44,24"
        fill="none" stroke="url(#wg)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Peak dots -->
  <circle cx="17" cy="16" r="1.8" fill="#BC8CFF" opacity="0.9"/>
  <circle cx="26" cy="32" r="1.8" fill="#58A6FF" opacity="0.9"/>
  <circle cx="35" cy="16" r="1.8" fill="#56D364" opacity="0.9"/>
</svg>
